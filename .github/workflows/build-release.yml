name: Build TreeSolutionHelper

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller jinja2

      - name: Build EXE
        shell: powershell
        run: |
          pyinstaller TreeSolutionHelper.spec

      - name: Create versioned EXE filename
        shell: powershell
        run: |
          $version = (Get-Content VERSION.txt -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+$') {
            throw "Invalid VERSION.txt format: $version"
          }
          $versionedName = "TreeSolutionHelper (V$version).exe"
          Copy-Item dist\TreeSolutionHelper.exe "dist\$versionedName" -Force
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSIONED_EXE=dist\$versionedName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TreeSolutionHelper-windows-v${{ env.APP_VERSION }}
          path: ${{ env.VERSIONED_EXE }}
          if-no-files-found: error

      - name: Upload EXE to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VERSIONED_EXE }}
